services:
  # Web Service
  - type: web
    name: education-platform
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python render_app.py"
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
